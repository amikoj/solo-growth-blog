<div id="cookie-banner" class="cookie-banner">
  <div class="cookie-content">
    <p>
      We use cookies to improve your experience. By using our site, you agree to our 
      <a href="/privacy">Privacy Policy</a> and <a href="/terms">Terms of Service</a>.
    </p>
    <div class="cookie-buttons">
      <button id="accept-cookies" class="btn btn-primary btn-sm">Accept</button>
      <button id="decline-cookies" class="btn btn-secondary btn-sm">Decline</button>
    </div>
  </div>
</div>

<script>
  (function() {
    const banner = document.getElementById('cookie-banner');
    const acceptBtn = document.getElementById('accept-cookies');
    const declineBtn = document.getElementById('decline-cookies');
    
    // Check if user has already made a choice
    const cookieConsent = localStorage.getItem('cookieConsent');
    
    if (!cookieConsent) {
      banner.classList.add('show');
    }

    acceptBtn.addEventListener('click', function() {
      localStorage.setItem('cookieConsent', 'accepted');
      banner.classList.remove('show');
      // Here you would typically initialize analytics
    });

    declineBtn.addEventListener('click', function() {
      localStorage.setItem('cookieConsent', 'declined');
      banner.classList.remove('show');
    });
  })();
</script>
