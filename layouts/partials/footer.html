<footer class="site-footer">
  <div class="footer-row">
    <div class="footer-left">© {{ now.Year }} {{ .Site.Params.author }}</div>
    <div class="footer-right">
      <a href="/privacy">Privacy</a>
      <span class="divider">/</span>
      <a href="/terms">Terms</a>
      <span class="divider">/</span>
      {{ with .OutputFormats.Get "RSS" }}
        <a href="{{ .RelPermalink }}">RSS</a>
      {{ else }}
        <a href="{{ "feed.xml" | relURL }}">RSS</a>
      {{ end }}
    </div>
  </div>
  {{ with .Site.Params.beianText }}
    <div class="beian">
      {{ $link := $.Site.Params.beianLink }}
      {{ if $link }}
        <a href="{{ $link }}" rel="noopener noreferrer" target="_blank">{{ . }}</a>
      {{ else }}
        {{ . }}
      {{ end }}
    </div>
  {{ end }}
</footer>
