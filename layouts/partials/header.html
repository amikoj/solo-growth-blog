<header class="site-header">
  <div class="brand">
    <a class="brand-title" href="{{ "/" | relURL }}">
      <img src="{{ "images/logo.svg" | relURL }}" alt="Logo" class="site-logo" width="32" height="32">
      {{ .Site.Title }}
    </a>
    {{ with .Site.Params.siteSubtitle }}
      <div class="brand-subtitle">{{ . }}</div>
    {{ end }}
  </div>
  {{ with .Site.Menus.main }}
    <nav class="nav">
      {{ range . }}
        <a class="nav-link" href="{{ .URL | relURL }}">{{ .Name }}</a>
      {{ end }}
    </nav>
  {{ end }}
</header>
