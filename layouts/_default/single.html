{{ define "main" }}
  <article class="page">
    <header class="post-header">
      <h1 class="page-title">{{ .Title }}</h1>
      <div class="post-meta">
        <time datetime="{{ .Date }}">{{ .Date.Format "2006-01-02" }}</time>
        {{ with .Params.tags }}
          <span class="post-tags">
            {{ range $i, $t := . }}
              {{ if $i }}<span class="sep">·</span>{{ end }}
              <a href="{{ (printf "/tags/%s/" ($t | urlize)) | relURL }}">{{ $t }}</a>
            {{ end }}
          </span>
        {{ end }}
      </div>
    </header>
    <div class="content">
      {{ .Content }}
    </div>
  </article>
{{ end }}
