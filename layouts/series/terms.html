{{ define "main" }}
<div class="container">
  <div class="page-header">
    <h1 class="page-title">{{ .Title }}</h1>
    {{ with .Content }}<div class="page-content">{{ . }}</div>{{ end }}
  </div>

  <div class="series-grid">
    {{ range .Data.Terms.ByCount }}
      <a href="{{ .Page.RelPermalink }}" class="series-card">
        <div class="series-cover">
          <div class="series-pattern"></div>
          <h3 class="series-name">{{ .Page.Title }}</h3>
        </div>
        <div class="series-info">
          <span class="series-count">{{ .Count }} Articles</span>
          <span class="series-cta">Read Series &rarr;</span>
        </div>
      </a>
    {{ end }}
  </div>
</div>
{{ end }}
