baseURL = "https://www.enjoytoday.cn/"
languageCode = "en-us"
title = "Mason's Build Logs"
enableRobotsTXT = true
enableGitInfo = true

[frontmatter]
  date = ["date", "publishDate", "lastmod"]
  lastmod = ["lastmod", ":git", "date", "publishDate"]

[pagination]
pagerSize = 10

[taxonomies]
tag = "tags"
category = "categories"
series = "series"

[mediaTypes]
  [mediaTypes."application/rss+xml"]
    suffixes = ["xml"]

[outputFormats]
  [outputFormats.RSS]
    mediaType = "application/rss+xml"
    baseName = "feed"

[params]
siteSubtitle = "One developer building in public. Sometimes it works, sometimes it doesn't."
siteDescription = "Mason's Build Logs - A solo developer's journey in indie hacking, AI engineering, and tech tutorials. Sharing real-world experiments, code snippets, and growth insights."
author = "Mason"
googleAnalyticsID = "G-0DZNVZWT2Q"
adsenseClient = "ca-pub-5905842540305144"
beianText = ""
beianLink = ""

[related]
  includeNewer = true
  threshold = 80
  toLower = false

  [[related.indices]]
    name = "tags"
    weight = 100

  [[related.indices]]
    name = "categories"
    weight = 70

  [[related.indices]]
    name = "date"
    weight = 10

[markup]
  [markup.goldmark.renderer]
  unsafe = true
  [markup.highlight]
  noClasses = true

[menu]
  [[menu.main]]
  name = "Projects"
  pageRef = "/projects"
  weight = 10

