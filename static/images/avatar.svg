<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Face: Round and full -->
  <circle cx="50" cy="50" r="45" fill="#ffe4e1" stroke="#333" stroke-width="3"/>
  
  <!-- Hair: Simple, slightly messy or receding -->
  <path d="M15,45 Q20,10 50,10 T85,45" fill="none" stroke="#333" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Glasses: Round, thick frames -->
  <g stroke="#333" stroke-width="3" fill="rgba(255,255,255,0.3)">
    <circle cx="35" cy="45" r="12"/>
    <circle cx="65" cy="45" r="12"/>
    <line x1="47" y1="45" x2="53" y2="45"/>
  </g>
  
  <!-- Eyes: Small dots behind glasses -->
  <circle cx="35" cy="45" r="3" fill="#333"/>
  <circle cx="65" cy="45" r="3" fill="#333"/>
  
  <!-- Nose: Small button nose -->
  <path d="M50,55 Q45,62 50,65" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Mouth: Friendly smile -->
  <path d="M35,75 Q50,85 65,75" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Cheeks: Rosy -->
  <circle cx="25" cy="60" r="5" fill="#ffb6c1" opacity="0.6"/>
  <circle cx="75" cy="60" r="5" fill="#ffb6c1" opacity="0.6"/>
  
  <!-- Double Chin: Subtle curve -->
  <path d="M40,88 Q50,92 60,88" fill="none" stroke="#333" stroke-width="2" opacity="0.3"/>
</svg>